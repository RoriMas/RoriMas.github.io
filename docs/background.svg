<!-- background-animated.svg
     Solo SVG animato (sfondo trasparente).
     Dimensioni e viewBox: 1084 x 322 (uguali al tuo background.svg).
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1084" height="322" viewBox="0 0 1084 322" preserveAspectRatio="xMidYMid"
     style="display:block; position:relative; background:transparent;">
  <defs>
    <linearGradient id="g-teal-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00AFAA"/>
      <stop offset="60%" stop-color="#E65512"/>
    </linearGradient>
    <linearGradient id="g-orange-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65512"/>
      <stop offset="100%" stop-color="#7B4EB2"/>
    </linearGradient>
    <linearGradient id="g-teal-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00AFAA"/>
      <stop offset="100%" stop-color="#7B4EB2"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .netline { fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:0.35; }
      .glow { filter: url(#f-soft); }
    ]]></style>
    <filter id="f-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g opacity="0.95">
    <path id="p1" class="netline" d="M120 260 C 160 200, 220 150, 300 140 C 380 130, 460 160, 540 170 C 620 180, 700 150, 820 140"
          stroke="url(#g-teal-purple)" stroke-width="3.5" />
    <path id="p2" class="netline" d="M50 180 C 140 140, 230 120, 340 140 C 450 160, 560 190, 680 170 C 800 150, 920 120, 1040 110"
          stroke="url(#g-teal-orange)" stroke-width="2.8" />
    <path id="p3" class="netline" d="M200 40 C 300 80, 420 120, 520 130 C 620 140, 760 120, 920 80"
          stroke="url(#g-orange-purple)" stroke-width="2.2" />
    <g>
      <path class="netline" d="M120 260 C 160 200, 220 150, 300 140 C 380 130, 460 160, 540 170 C 620 180, 700 150, 820 140"
            stroke="url(#g-teal-purple)" stroke-width="0.9" stroke-dasharray="6 6" opacity="0.16">
        <animate attributeName="stroke-dashoffset" from="0" to="24" dur="8s" repeatCount="indefinite"/>
      </path>
      <path class="netline" d="M50 180 C 140 140, 230 120, 340 140 C 450 160, 560 190, 680 170 C 800 150, 920 120, 1040 110"
            stroke="url(#g-teal-orange)" stroke-width="0.9" stroke-dasharray="6 6" opacity="0.12">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="10s" repeatCount="indefinite"/>
      </path>
      <path class="netline" d="M200 40 C 300 80, 420 120, 520 130 C 620 140, 760 120, 920 80"
            stroke="url(#g-orange-purple)" stroke-width="0.9" stroke-dasharray="5 5" opacity="0.10">
        <animate attributeName="stroke-dashoffset" from="0" to="20" dur="12s" repeatCount="indefinite"/>
      </path>
    </g>
    <g opacity="0.9">
      <circle cx="140" cy="220" r="4.5" fill="#00AFAA" opacity="0.95"/>
      <circle cx="260" cy="155" r="5.5" fill="#E65512" opacity="0.95"/>
      <circle cx="380" cy="165" r="3.8" fill="#7B4EB2" opacity="0.95"/>
      <circle cx="520" cy="140" r="6.5" fill="#00AFAA" opacity="0.95"/>
      <circle cx="680" cy="170" r="4.2" fill="#E65512" opacity="0.95"/>
      <circle cx="900" cy="120" r="3.6" fill="#7B4EB2" opacity="0.95"/>
    </g>
    <g class="glow" opacity="0.98">
      <circle r="6" fill="#00AFAA" id="node1">
        <animate attributeName="r" values="5;8;5" dur="2.6s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <circle r="12" fill="#00AFAA" opacity="0.06">
        <animate attributeName="r" values="10;18;10" dur="2.6s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <animateMotion xlink:href="#node1" dur="9s" repeatCount="indefinite" rotate="auto">
        <mpath xlink:href="#p1"/>
      </animateMotion>
    </g>
    <g class="glow" opacity="0.98">
      <circle r="5.5" fill="#E65512" id="node2">
        <animate attributeName="r" values="4.5;7.5;4.5" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
      </circle>
      <circle r="11" fill="#E65512" opacity="0.05">
        <animate attributeName="r" values="9;16;9" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
      </circle>
      <animateMotion xlink:href="#node2" dur="11s" repeatCount="indefinite" rotate="auto" begin="0.4s">
        <mpath xlink:href="#p2"/>
      </animateMotion>
    </g>
    <g class="glow" opacity="0.98">
      <circle r="5" fill="#7B4EB2" id="node3">
        <animate attributeName="r" values="4;7;4" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <circle r="10" fill="#7B4EB2" opacity="0.04">
        <animate attributeName="r" values="8;15;8" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <animateMotion xlink:href="#node3" dur="13s" repeatCount="indefinite" rotate="auto" begin="0.9s">
        <mpath xlink:href="#p3"/>
      </animateMotion>
    </g>
  </g>
  <title>Decorative animated generative-network background</title>
  <desc>Rete astratta animata che richiama nodi e connessioni in teal, arancio e viola. Decorativa.</desc>
</svg>
