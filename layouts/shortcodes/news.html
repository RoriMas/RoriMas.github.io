<section class="news-section" style="background:#ececec;">
  <div class="news-section-inner">

    <div class="section-heading">
      <h2>NEWS&EVENTI</h2>
      <span aria-hidden="true"></span>
    </div>

    <div class="space-y-6">
      {{ range site.Data.news_eventi }}
        <a class="news-home-item {{ if .image }}has-image{{ else }}no-image{{ end }}" href="/news-eventi/#{{ .id }}" style="--event-accent: {{ .accent }};">
          {{ with .image }}
            <img src="{{ . }}" alt="" class="news-home-image">
          {{ end }}
          <div class="news-home-copy">
            <div>
              <p class="font-medium">{{ .title }}</p>
              <p class="text-sm text-gray-600">{{ .subtitle }}</p>
              {{ with .excerpt }}
                <p class="news-home-excerpt">{{ . }}</p>
              {{ end }}
            </div>
            <span>→</span>
          </div>
        </a>
      {{ end }}

    </div>

  </div>
</section>
